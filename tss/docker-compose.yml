services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tss
      POSTGRES_PASSWORD: tss
      POSTGRES_DB: tss
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tss"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tss:tss@db:5432/tss
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  survey:
    build: ../survey-ui
    environment:
      DATABASE_URL: postgresql://tss:tss@db:5432/tss
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data: